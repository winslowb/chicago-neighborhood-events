<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Loop Events &amp; Closures — Chicago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ═══════════════════════════════════════
   Design System
   ═══════════════════════════════════════ */
:root {
  /* Core palette */
  --bg: #0f0f1a;
  --bg-elevated: #151528;
  --card: #1a1a2e;
  --card-hover: #1f1f38;
  --card-border: #2a2a4a;
  --card-border-hover: #3a3a5c;

  /* Accent & semantic */
  --accent: #df840c;
  --accent-glow: rgba(223,132,12,0.15);
  --accent-dim: #b86e0a;
  --green: #2ecc71;
  --blue: #3498db;
  --orange: #e67e22;
  --red: #e74c3c;
  --purple: #9b59b6;
  --teal: #1abc9c;
  --pink: #e84393;

  /* Text */
  --text: #e4e4ec;
  --text-secondary: #9ca3b8;
  --text-muted: #6b7280;

  /* Surfaces */
  --surface-overlay: rgba(15,15,26,0.85);
  --glass: rgba(26,26,46,0.7);
  --glass-border: rgba(255,255,255,0.06);

  /* Layout */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);

  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
}

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Layout ───────────────────────────── */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 20px 32px;
}

/* ── Header ────────────────────────────── */
header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--card-border);
  margin-bottom: 20px;
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--surface-overlay);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.02em;
}

h1 .logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent-glow);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}

h1 small {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 400;
  font-family: var(--font-sans);
  letter-spacing: 0;
}

.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat {
  background: var(--card);
  padding: 6px 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--card-border);
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.stat strong {
  color: var(--accent);
  font-size: 1rem;
  font-weight: 700;
}

.stat strong.stat-green { color: var(--green); }
.stat strong.stat-red { color: var(--red); }

/* ── Controls Bar ──────────────────────── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  padding: 14px 18px;
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  box-shadow: var(--shadow-card);
}

.controls .control-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.controls label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.controls input[type="date"] {
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--card-border);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: var(--font-sans);
  transition: border-color 0.2s;
  color-scheme: dark;
}

.controls input[type="date"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.controls .btn {
  padding: 7px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: var(--font-sans);
  white-space: nowrap;
}

.controls .btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.controls .btn:active {
  transform: scale(0.97);
}

.controls .btn:disabled,
.controls .btn[disabled] {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover { background: var(--accent-dim); }

.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--card-border) !important;
}

.btn-secondary:hover {
  border-color: var(--text-muted) !important;
  color: var(--text);
}

.controls .separator {
  width: 1px;
  height: 28px;
  background: var(--card-border);
  flex-shrink: 0;
}

.controls .auto-refresh {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  font-size: 0.8rem;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}

.controls .auto-refresh input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
  cursor: pointer;
}

/* Search input */
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
  max-width: 280px;
}

.search-wrap input {
  width: 100%;
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--card-border);
  padding: 7px 12px 7px 32px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: var(--font-sans);
  transition: border-color 0.2s;
}

.search-wrap input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-wrap input::placeholder { color: var(--text-muted); }

.search-wrap .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}

/* Sort */
.sort-select {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--card-border);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: border-color 0.2s;
}

.sort-select:focus {
  outline: none;
  border-color: var(--accent);
}

/* ── Category Filters ──────────────────── */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-muted);
  transition: all 0.15s ease;
  user-select: none;
  font-family: var(--font-sans);
}

.chip:focus,
.chip:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.chip:active {
  transform: scale(0.95);
}

.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}

.chip:hover:not(.active) {
  border-color: var(--text-muted);
  color: var(--text);
}

.chip .count {
  font-size: 0.65rem;
  background: rgba(255,255,255,0.1);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.chip.active .count {
  background: rgba(0,0,0,0.2);
}

/* ── Map ───────────────────────────────── */
#map {
  height: 440px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  z-index: 1;
  box-shadow: var(--shadow-card);
}

/* ── Legend ────────────────────────────── */
.legend-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  padding: 8px 14px;
  background: var(--card);
  border-radius: var(--radius-md);
  border: 1px solid var(--card-border);
  font-size: 0.78rem;
}

.legend-bar .legend-label {
  color: var(--text-muted);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}

/* ── Event Counts Summary ───────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}

.section-header h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--text);
  font-weight: 600;
}

.section-header .result-count {
  font-size: 0.78rem;
  color: var(--text-muted);
  padding: 4px 12px;
  background: var(--card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--card-border);
}

/* ── Event List ────────────────────────── */
.event-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.event-card {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  background: var(--card);
  border-radius: var(--radius-md);
  border: 1px solid var(--card-border);
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: var(--shadow-card);
  animation: fadeSlideIn 0.35s ease both;
}

.event-card:nth-child(1) { animation-delay: 0.02s; }
.event-card:nth-child(2) { animation-delay: 0.04s; }
.event-card:nth-child(3) { animation-delay: 0.06s; }
.event-card:nth-child(4) { animation-delay: 0.08s; }
.event-card:nth-child(5) { animation-delay: 0.10s; }
.event-card:nth-child(6) { animation-delay: 0.12s; }
.event-card:nth-child(7) { animation-delay: 0.14s; }
.event-card:nth-child(8) { animation-delay: 0.16s; }
.event-card:nth-child(9) { animation-delay: 0.18s; }
.event-card:nth-child(10) { animation-delay: 0.20s; }
.event-card:nth-child(n+11) { animation-delay: 0.22s; }

.event-card:hover {
  background: var(--card-hover);
  border-color: var(--card-border-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.event-card:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.event-card .color-bar {
  width: 4px;
  border-radius: 3px;
  flex-shrink: 0;
}

.event-card .body { flex: 1; min-width: 0; }

.event-card .title {
  font-weight: 600;
  font-size: 0.92rem;
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.event-card .meta {
  font-size: 0.78rem;
  color: var(--text-secondary);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.event-card .meta span { white-space: nowrap; }

.event-card .desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-top: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}

.badge {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.badge-source {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── Loading Skeleton ───────────────────── */
.skeleton-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.skeleton-card {
  padding: 14px 18px;
  background: var(--card);
  border-radius: var(--radius-md);
  border: 1px solid var(--card-border);
}

.skeleton-line {
  height: 14px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--card-border) 25%, var(--card-hover) 50%, var(--card-border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  margin-bottom: 8px;
}

.skeleton-line:last-child { margin-bottom: 0; }

.skeleton-line.w40 { width: 40%; }
.skeleton-line.w60 { width: 60%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.sm { height: 10px; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Empty & Error States ───────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px dashed var(--card-border);
}

.empty-state .empty-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-state h3 {
  font-family: var(--font-display);
  color: var(--text);
  margin-bottom: 6px;
  font-size: 1.1rem;
}

.empty-state p {
  color: var(--text-muted);
  font-size: 0.85rem;
  max-width: 360px;
  margin: 0 auto;
}

.error-msg {
  background: rgba(231,76,60,0.1);
  border: 1px solid rgba(231,76,60,0.3);
  padding: 20px;
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  text-align: center;
}

.error-msg strong {
  color: var(--red);
  display: block;
  margin-bottom: 4px;
}

.error-msg .err-detail {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-bottom: 12px;
}

/* ── Footer ────────────────────────────── */
footer {
  text-align: center;
  padding: 24px 0 16px;
  font-size: 0.72rem;
  color: var(--text-muted);
  border-top: 1px solid var(--card-border);
  margin-top: 32px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px 16px;
}

footer a {
  color: var(--accent);
  text-decoration: none;
  transition: opacity 0.2s;
}

footer a:hover { opacity: 0.8; text-decoration: underline; }

/* ── Modal / Drawer ─────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
  backdrop-filter: blur(4px);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-xl);
  max-width: 540px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-elevated);
  animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 20px 22px 12px;
  border-bottom: 1px solid var(--card-border);
}

.modal-header .modal-color-bar {
  width: 5px;
  height: 40px;
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
}

.modal-header .modal-title-group { flex: 1; }

.modal-header .modal-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.05rem;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.modal-header .modal-source {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.modal-close:hover {
  background: var(--card-hover);
  color: var(--text);
  border-color: var(--text-muted);
}

.modal-body { padding: 14px 22px 20px; }

.modal-field {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 0.85rem;
  line-height: 1.5;
}

.modal-field:last-child { margin-bottom: 0; }

.modal-field .field-label {
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 500;
  min-width: 80px;
  flex-shrink: 0;
  padding-top: 1px;
}

.modal-field .field-value {
  color: var(--text);
  word-break: break-word;
}

.modal-field .field-value .badge { vertical-align: middle; }

.modal-actions {
  padding: 0 22px 18px;
  display: flex;
  gap: 8px;
}

.modal-actions .btn {
  flex: 1;
  padding: 9px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-sans);
  text-align: center;
  text-decoration: none;
}

.modal-actions .btn-primary { background: var(--accent); color: #fff; }
.modal-actions .btn-primary:hover { background: var(--accent-dim); }

.modal-actions .btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--card-border);
}

.modal-actions .btn-secondary:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

/* ── Leaflet Theming ────────────────────── */
.leaflet-popup-content-wrapper {
  background: var(--card) !important;
  color: var(--text) !important;
  border-radius: var(--radius-md) !important;
  border: 1px solid var(--card-border) !important;
  box-shadow: var(--shadow-elevated) !important;
}

.leaflet-popup-tip { background: var(--card) !important; }
.leaflet-popup-content { margin: 12px 16px !important; font-size: 0.85rem !important; line-height: 1.5 !important; }
.leaflet-popup-content strong { color: var(--accent); }
.leaflet-popup-content .popup-meta,
.leaflet-popup-content .popup-desc { color: var(--text-muted); }
.leaflet-popup-content .popup-meta { font-size: 0.8rem; }
.leaflet-popup-content .popup-desc { font-size: 0.75rem; }
.leaflet-popup-content .popup-addr { font-size: 0.8rem; }
.leaflet-popup-close-button { color: var(--text-muted) !important; }

.leaflet-control-zoom a {
  background: var(--card) !important;
  color: var(--text) !important;
  border-color: var(--card-border) !important;
}

.leaflet-control-zoom a:hover { background: var(--card-hover) !important; }

/* ── Responsive ─────────────────────────── */
@media (max-width: 820px) {
  .container { padding: 0 14px 24px; }
  header { flex-direction: column; align-items: flex-start; }
  .stats { width: 100%; }
  .controls { flex-direction: column; align-items: stretch; }
  .controls .control-group { flex-wrap: wrap; }
  .controls .separator { display: none; }
  .search-wrap { max-width: none; }
  .controls .auto-refresh { margin-left: 0; }
  .sort-select { width: 100%; }
  .section-header { flex-direction: column; align-items: flex-start; }
  #map { height: 320px; }
  .modal { max-height: 90vh; margin: 12px; }
  .modal-field { flex-direction: column; gap: 2px; }
  .modal-field .field-label { min-width: 0; }
}

@media (max-width: 420px) {
  h1 { font-size: 1.2rem; }
  .stat { font-size: 0.72rem; padding: 4px 10px; }
  .event-card { padding: 10px 14px; }
  .badge { font-size: 0.55rem; padding: 1px 7px; }
}

/* ── Scrollbar ──────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Accessibility ──────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}
</style>
</head>
<body>

<div class="container">

  <!-- ═══ HEADER ═══ -->
  <header role="banner">
    <h1>
      <span class="logo-icon" aria-hidden="true">📍</span>
      South Loop Events &amp; Closures
      <small>Chicago, IL</small>
    </h1>
    <div class="stats" id="stats" role="status" aria-live="polite">
      <div class="stat">📅 <strong id="statDays">—</strong> <span class="sr-only">day window</span><span aria-hidden="true">days</span></div>
      <div class="stat">📍 <strong id="statEvents" class="stat-green">—</strong> <span class="sr-only">events</span><span aria-hidden="true">events</span></div>
      <div class="stat">🚧 <strong id="statClosures" class="stat-red">—</strong> <span class="sr-only">closures</span><span aria-hidden="true">closures</span></div>
    </div>
  </header>

  <!-- ═══ CONTROLS ═══ -->
  <main id="main-content">
  <div class="controls" role="toolbar" aria-label="Search and filter controls">
    <div class="control-group">
      <label>
        From
        <input type="date" id="dateFrom" aria-label="Start date">
      </label>
      <label>
        To
        <input type="date" id="dateTo" aria-label="End date">
      </label>
    </div>

    <div class="control-group">
      <button class="btn btn-primary" id="btnGo" aria-label="Search events">🔍 Search</button>
      <button class="btn btn-secondary" id="btnToday">Today</button>
      <button class="btn btn-secondary" id="btnWeek">+1 Week</button>
      <button class="btn btn-secondary" id="btnMonth">+1 Month</button>
    </div>

    <span class="separator" aria-hidden="true"></span>

    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="search" id="searchInput" placeholder="Search events..." aria-label="Search events by title, description, or address">
    </div>

    <select class="sort-select" id="sortSelect" aria-label="Sort events">
      <option value="date">Sort by Date</option>
      <option value="category">Sort by Category</option>
      <option value="title">Sort by Title</option>
    </select>

    <select class="sort-select" id="closureFilter" aria-label="Filter by closure type" style="max-width:150px">
      <option value="all">All Closures</option>
      <option value="Full">Full Closure</option>
      <option value="Partial">Partial Closure</option>
      <option value="Curblane">Curblane</option>
      <option value="none">No Closure</option>
    </select>

    <label class="auto-refresh">
      <input type="checkbox" id="chkAutoRefresh" checked>
      <span>Auto-refresh</span>
    </label>
  </div>

  <!-- ═══ CATEGORY FILTERS ═══ -->
  <nav class="filters" id="filters" aria-label="Category filters" role="group"></nav>

  <!-- ═══ MAP ═══ -->
  <div id="map" role="application" aria-label="Event map"></div>

  <!-- ═══ LEGEND ═══ -->
  <div class="legend-bar" id="legendBar"></div>

  <!-- ═══ EVENT LIST ═══ -->
  <div class="section-header">
    <h2>Events</h2>
    <span class="result-count" id="resultCount" role="status" aria-live="polite"></span>
  </div>
  <div id="eventList" role="list" aria-label="Events list"></div>

  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer role="contentinfo">
    <span>Data from <a href="https://data.cityofchicago.org/" target="_blank" rel="noopener">City of Chicago Data Portal</a></span>
    <span><a href="https://data.cityofchicago.org/d/jdis-5sry" target="_blank" rel="noopener">Transport Permits</a> &amp; <a href="https://data.cityofchicago.org/d/xgse-8eg7" target="_blank" rel="noopener">Special Events</a></span>
    <span><a href="https://github.com/winslowb/chicago-neighborhood-events" target="_blank" rel="noopener">GitHub</a></span>
  </footer>
</div>

<script>
/* ═══════════════════════════════════════════════
   Chicago Neighborhood Events — App
   ═══════════════════════════════════════════════ */

// ── Config ─────────────────────────────────────
const CONFIG = {
  lat: 41.872,
  lon: -87.625,
  zoom: 15,
  radiusMiles: 1.0,
  defaultDays: 14,
  permitsId: "jdis-5sry",
  eventsId: "xgse-8eg7",
  sodaBase: "https://data.cityofchicago.org/resource",
};

const COLORS = {
  festival: "#e67e22",
  athletic: "#2ecc71",
  street_closure: "#e74c3c",
  filming: "#9b59b6",
  block_party: "#e84393",
  community: "#1abc9c",
  commercial: "#3498db",
  construction: "#f1c40f",
};

const CATEGORY_LABELS = {
  festival: "🎪 Festival",
  athletic: "🏃 Athletic",
  street_closure: "🚧 Street Closure",
  filming: "🎬 Filming",
  block_party: "🎉 Block Party",
  community: "👥 Community",
  commercial: "🛒 Commercial",
  construction: "🔧 Construction",
};

// ── State ──────────────────────────────────────
let map, markerLayer, allEvents = [], filteredEvents = [];
let activeCategories = new Set();
let searchTimer = null;

// ── Init ───────────────────────────────────────
function init() {
  const today = new Date();
  const twoWeeks = new Date(today);
  twoWeeks.setDate(twoWeeks.getDate() + CONFIG.defaultDays);
  document.getElementById("dateFrom").value = fmtDate(today);
  document.getElementById("dateTo").value = fmtDate(twoWeeks);

  // Map
  map = L.map("map", {
    zoomControl: true,
    attributionControl: true,
  }).setView([CONFIG.lat, CONFIG.lon], CONFIG.zoom);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  markerLayer = L.featureGroup().addTo(map);

  // Home marker
  L.circleMarker([CONFIG.lat, CONFIG.lon], {
    radius: 10, color: "#df840c", fillColor: "#df840c",
    fillOpacity: 0.7, weight: 2,
  }).addTo(map).bindTooltip("910 S Michigan Ave", { permanent: false, direction: "top" });

  // Search radius
  L.circle([CONFIG.lat, CONFIG.lon], {
    radius: CONFIG.radiusMiles * 1609.34,
    color: "#df840c", fillColor: "#df840c",
    fillOpacity: 0.05, weight: 1, dashArray: "5, 10",
  }).addTo(map);

  // Button presets
  const setDays = (n) => {
    const t = new Date();
    document.getElementById("dateFrom").value = fmtDate(t);
    const e = new Date(t); e.setDate(e.getDate() + n);
    document.getElementById("dateTo").value = fmtDate(e);
    fetchData();
  };

  document.getElementById("btnToday").addEventListener("click", () => setDays(0));
  document.getElementById("btnWeek").addEventListener("click", () => setDays(7));
  document.getElementById("btnMonth").addEventListener("click", () => setDays(30));
  document.getElementById("btnGo").addEventListener("click", fetchData);

  // Enter key on date fields triggers search
  document.getElementById("dateFrom").addEventListener("keydown", (e) => { if (e.key === "Enter") fetchData(); });
  document.getElementById("dateTo").addEventListener("keydown", (e) => { if (e.key === "Enter") fetchData(); });

  // Search — debounced
  document.getElementById("searchInput").addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderFiltered, 200);
  });

  // Sort
  document.getElementById("sortSelect").addEventListener("change", renderFiltered);

  // Closure type filter
  document.getElementById("closureFilter").addEventListener("change", renderFiltered);

  // Auto-refresh every 5 min
  setInterval(() => {
    if (document.getElementById("chkAutoRefresh").checked) fetchData(true);
  }, 5 * 60 * 1000);

  // Keyboard: Escape closes modal
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });

  fetchData();
}

function fmtDate(d) {
  return d.toISOString().split("T")[0];
}

// ── Helpers ────────────────────────────────────
function getColor(category) {
  return COLORS[category] || "#95a5a6";
}

function getCategoryLabel(category) {
  return CATEGORY_LABELS[category] || category.replace(/_/g, " ");
}

function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Fetch Data ─────────────────────────────────
async function fetchData(silent = false) {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const lat = CONFIG.lat;
  const lon = CONFIG.lon;
  const radius = CONFIG.radiusMiles;

  if (!silent) showLoading();

  try {
    const latR = radius / 69.0;
    const lonR = radius / (69.0 * Math.cos(lat * Math.PI / 180) || 1);
    const latMin = lat - latR, latMax = lat + latR;
    const lonMin = lon - lonR, lonMax = lon + lonR;

    const permitUrl = `${CONFIG.sodaBase}/${CONFIG.permitsId}.json`
      + `?$where=(applicationtype='DOT_SE'`
      + ` AND applicationstartdate <= '${to}T23:59:59'`
      + ` AND applicationenddate >= '${from}T00:00:00'`
      + ` AND latitude between ${latMin} and ${latMax}`
      + ` AND longitude between ${lonMin} and ${lonMax}`
      + `) OR (applicationtype='DOT_OCC'`
      + ` AND worktype in ('StClosure','Festival','Parade','Filming','BlockParty','Assembly','Athletic','FarmMkt','SideSale','PublicPlac','Peoples')`
      + ` AND applicationstartdate >= '${from}T00:00:00'`
      + ` AND applicationstartdate <= '${to}T23:59:59'`
      + ` AND latitude between ${latMin} and ${latMax}`
      + ` AND longitude between ${lonMin} and ${lonMax}`
      + `) OR (applicationtype != 'DOT_SE' AND applicationtype != 'DOT_OCC'`
      + ` AND applicationstartdate >= '${from}T00:00:00'`
      + ` AND applicationstartdate <= '${to}T23:59:59'`
      + ` AND latitude between ${latMin} and ${latMax}`
      + ` AND longitude between ${lonMin} and ${lonMax}`
      + `)&$order=applicationstartdate ASC&$limit=500`;

    const [permitsRaw, eventsRaw] = await Promise.all([
      fetch(permitUrl).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.sodaBase}/${CONFIG.eventsId}.json`
        + `?$where=date >= '${from}' AND date <= '${to}'`
        + `&$order=date ASC&$limit=200`)
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
    ]);

    const permits = (permitsRaw || []).map(normalizePermit);

    let events = (eventsRaw || []).map(normalizeEvent);
    events = events.filter(e => {
      if (!e.lat || !e.lon) return false;
      return e.lat >= latMin && e.lat <= latMax && e.lon >= lonMin && e.lon <= lonMax;
    });

    allEvents = [...permits, ...events];
    allEvents.sort((a, b) => (a.dateStart || "9999-12-31").localeCompare(b.dateStart || "9999-12-31"));

    // Activate all categories
    const cats = new Set(allEvents.map(e => e.category));
    activeCategories = new Set(cats);

    render();
    if (!silent) hideLoading();
  } catch (err) {
    console.error("Fetch error:", err);
    document.getElementById("eventList").innerHTML = `
      <div class="error-msg" role="alert">
        <strong>⚠️ Failed to load data</strong>
        <div class="err-detail">${escHtml(err.message)}</div>
        <button class="btn btn-primary" onclick="fetchData()">Retry</button>
      </div>`;
    document.getElementById("resultCount").textContent = "";
    if (!silent) hideLoading();
  }
}

// ── Normalizers ────────────────────────────────
function normalizePermit(p) {
  const start = (p.applicationstartdate || "").substring(0, 10);
  const end = (p.applicationenddate || "").substring(0, 10);
  const addr = [p.streetnumberfrom, p.direction, p.streetname, p.suffix]
    .filter(Boolean).join(" ").trim();
  const comments = p.comments || "";
  const wt = p.worktype || "";
  const at = p.applicationtype || "";

  let category = "construction";
  if (["Festival","Parade"].includes(wt)) category = "festival";
  else if (wt === "Athletic") category = "athletic";
  else if (wt === "StClosure") category = "street_closure";
  else if (wt === "Filming") category = "filming";
  else if (wt === "BlockParty") category = "block_party";
  else if (["Assembly","Peoples"].includes(wt)) category = "community";
  else if (["FarmMkt","SideSale","PublicPlac"].includes(wt)) category = "commercial";
  else if (at === "DOT_SE") category = "festival";

  return {
    id: p.uniquekey || Math.random().toString(36),
    source: "transport_permit",
    sourceLabel: "Transport Permit",
    title: p.applicationname || comments.substring(0, 80) || addr,
    description: comments || p.worktypedescription || "",
    category,
    dateStart: start,
    dateEnd: end,
    address: addr,
    closureType: p.streetclosure || "",
    ward: "",
    lat: parseFloat(p.latitude) || 0,
    lon: parseFloat(p.longitude) || 0,
    permitType: p.applicationdescription || "",
    workType: p.worktypedescription || "",
    status: p.applicationstatus || "",
    color: getColor(category),
  };
}

function normalizeEvent(e) {
  const loc = e.location || {};
  const coords = loc.coordinates || [0, 0];
  const lon = coords[0] || 0, lat = coords[1] || 0;
  const cat = (e.event_type || "").toLowerCase().replace(/\s+/g, "_");

  return {
    id: e.event_details + e.date || Math.random().toString(36),
    source: "special_event",
    sourceLabel: "Special Event",
    title: e.event_details || "",
    description: `${e.event_type || ""} at ${e.venue || ""}`,
    category: cat,
    dateStart: (e.date || "").substring(0, 10),
    dateEnd: (e.date || "").substring(0, 10),
    address: e.venue_address || "",
    closureType: ["Parade","Festival","Marathon"].includes(e.event_type) ? "Full" : "Partial",
    ward: e.ward || "",
    lat, lon,
    permitType: "Special Event",
    workType: e.event_type || "",
    status: "Scheduled",
    color: getColor(cat),
  };
}

// ── Render Pipeline ────────────────────────────
function render() {
  renderFiltered();
  renderStats();
  renderFilters();
  renderLegend();
}

function renderFiltered() {
  const searchTerm = (document.getElementById("searchInput").value || "").toLowerCase().trim();
  const sortBy = document.getElementById("sortSelect").value;
  const closureFilter = document.getElementById("closureFilter").value;

  // Filter by category + search + closure type
  filteredEvents = allEvents.filter(e => {
    if (!activeCategories.has(e.category)) return false;
    if (searchTerm) {
      const haystack = `${e.title} ${e.description} ${e.address} ${e.workType}`.toLowerCase();
      if (!haystack.includes(searchTerm)) return false;
    }
    if (closureFilter === "none" && e.closureType) return false;
    if (closureFilter !== "all" && closureFilter !== "none" && e.closureType !== closureFilter) return false;
    return true;
  });

  // Sort
  if (sortBy === "date") {
    filteredEvents.sort((a, b) => (a.dateStart || "9999-12-31").localeCompare(b.dateStart || "9999-12-31"));
  } else if (sortBy === "category") {
    filteredEvents.sort((a, b) => a.category.localeCompare(b.category) || (a.dateStart || "").localeCompare(b.dateStart || ""));
  } else if (sortBy === "title") {
    filteredEvents.sort((a, b) => a.title.localeCompare(b.title) || (a.dateStart || "").localeCompare(b.dateStart || ""));
  }

  renderMap();
  renderList();
  renderStats();
}

function renderStats() {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const days = Math.round((new Date(to) - new Date(from)) / (24*60*60*1000)) + 1;
  const closures = filteredEvents.filter(e => e.closureType === "Full").length;
  document.getElementById("statDays").textContent = days;
  document.getElementById("statEvents").textContent = filteredEvents.length;
  document.getElementById("statClosures").textContent = closures;
}

function renderFilters() {
  const cats = [...new Set(allEvents.map(e => e.category))];
  const counts = {};
  allEvents.forEach(e => { counts[e.category] = (counts[e.category] || 0) + 1; });

  const container = document.getElementById("filters");
  container.innerHTML = `
    <span class="chip ${activeCategories.size === cats.length ? 'active' : ''}"
          role="button" tabindex="0"
          onclick="toggleAllCategories()"
          onkeydown="if(event.key==='Enter'||event.key===' ')event.preventDefault();toggleAllCategories()"
          aria-pressed="${activeCategories.size === cats.length}">
      All
      <span class="count">${allEvents.length}</span>
    </span>
    ${cats.map(c => `
      <span class="chip ${activeCategories.has(c) ? 'active' : ''}"
            data-cat="${c}"
            role="button" tabindex="0"
            onclick="toggleCategory('${c}')"
            onkeydown="if(event.key==='Enter'||event.key===' ')event.preventDefault();toggleCategory('${c}')"
            style="border-color:${getColor(c)};${activeCategories.has(c) ? '' : `color:${getColor(c)}`}"
            aria-pressed="${activeCategories.has(c)}">
        ${getCategoryLabel(c)}
        <span class="count">${counts[c] || 0}</span>
      </span>
    `).join("")}
  `;
}

function toggleAllCategories() {
  const cats = [...new Set(allEvents.map(e => e.category))];
  activeCategories = activeCategories.size === cats.length ? new Set() : new Set(cats);
  render();
}

function toggleCategory(cat) {
  if (activeCategories.has(cat)) activeCategories.delete(cat);
  else activeCategories.add(cat);
  render();
}

function renderLegend() {
  const cats = [...new Set(allEvents.filter(e => activeCategories.has(e.category)).map(e => e.category))];
  if (cats.length === 0) {
    document.getElementById("legendBar").innerHTML = "";
    return;
  }
  document.getElementById("legendBar").innerHTML = `
    <span class="legend-label">Legend</span>
    ${cats.map(c => `
      <span class="legend-item">
        <span class="legend-dot" style="background:${getColor(c)}"></span>
        ${getCategoryLabel(c)}
      </span>
    `).join("")}
  `;
}

function renderMap() {
  markerLayer.clearLayers();
  const events = filteredEvents;

  events.forEach(e => {
    if (!e.lat || !e.lon) return;
    const color = e.color || getColor(e.category);
    const radius = e.closureType === "Full" ? 12 : e.closureType === "Curblane" || e.closureType === "Partial" ? 8 : 6;

    const marker = L.circleMarker([e.lat, e.lon], {
      radius, color, fillColor: color,
      fillOpacity: 0.7, weight: 2, opacity: 0.9,
    });

    const days = e.dateStart === e.dateEnd ? e.dateStart : `${e.dateStart} → ${e.dateEnd}`;
    const closureBadge = e.closureType ? `<br><span style="font-size:0.75rem;color:${color}">${e.closureType} closure</span>` : "";

    marker.bindPopup(`
      <div style="max-width:280px">
        <strong>${escHtml(e.title)}</strong><br>
        <span class="popup-meta">${days}</span><br>
        ${e.address ? `<span class="popup-addr">📍 ${escHtml(e.address)}</span><br>` : ""}
        <span class="popup-desc">${escHtml(e.description.substring(0, 120))}</span>${closureBadge}
      </div>
    `);

    marker.on("click", () => openModal(e));
    markerLayer.addLayer(marker);
  });

  if (events.length > 0) {
    const bounds = markerLayer.getBounds();
    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: CONFIG.zoom });
    }
  }
}

function renderList() {
  const container = document.getElementById("eventList");
  const countEl = document.getElementById("resultCount");

  if (filteredEvents.length === 0) {
    const searchTerm = document.getElementById("searchInput").value.trim();
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" aria-hidden="true">${searchTerm ? "🔍" : "📭"}</div>
        <h3>${searchTerm ? "No matching events" : "No events found"}</h3>
        <p>${searchTerm ? "Try a different search term or adjust your filters." : "Try expanding your date range or search area."}</p>
      </div>`;
    countEl.textContent = "0 results";
    return;
  }

  countEl.textContent = `${filteredEvents.length} result${filteredEvents.length !== 1 ? "s" : ""}`;

  container.innerHTML = filteredEvents.map((e, i) => {
    const days = e.dateStart === e.dateEnd
      ? `<span>📅 ${e.dateStart}</span>`
      : `<span>📅 ${e.dateStart} → ${e.dateEnd}</span>`;

    const closureTag = e.closureType
      ? `<span class="badge" style="background:${e.color}20;color:${e.color};border:1px solid ${e.color}40">${e.closureType}</span>`
      : "";

    const wardTag = e.ward ? `<span>🏛️ Ward ${e.ward}</span>` : "";
    const sourceTag = `<span class="badge-source">${e.sourceLabel || e.source}</span>`;

    return `
      <div class="event-card"
           role="listitem"
           tabindex="0"
           onclick="openModal(allEvents.find(ev => ev.id === '${escHtml(e.id)}') || ${JSON.stringify(e).replace(/"/g, "&quot;")})"
           onkeydown="if(event.key==='Enter'||event.key===' ')event.preventDefault();openModal(allEvents.find(ev => ev.id === '${escHtml(e.id)}') || ${JSON.stringify(e).replace(/"/g, "&quot;")})"
           style="animation-delay:${Math.min(i, 10) * 0.03}s">
        <div class="color-bar" style="background:${e.color}"></div>
        <div class="body">
          <div class="title">${escHtml(e.title.substring(0, 120))}</div>
          <div class="meta">
            ${days}
            ${e.address ? `<span>📍 ${escHtml(e.address.substring(0, 50))}</span>` : ""}
            ${closureTag}
            ${wardTag}
            ${sourceTag}
          </div>
          ${e.description ? `<div class="desc">${escHtml(e.description.substring(0, 200))}</div>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

// ── Modal ──────────────────────────────────────
function openModal(e) {
  if (!e) return;
  const existing = document.querySelector(".modal-overlay");
  if (existing) existing.remove();

  const days = e.dateStart === e.dateEnd ? e.dateStart : `${e.dateStart} → ${e.dateEnd}`;
  const closureTag = e.closureType ? `<span class="badge" style="background:${e.color}20;color:${e.color};border:1px solid ${e.color}40">${e.closureType}</span>` : "";

  const fields = [
    { label: "Date", value: days },
    { label: "Category", value: `<span class="badge" style="background:${e.color}20;color:${e.color};border:1px solid ${e.color}40">${getCategoryLabel(e.category)}</span>` },
    { label: "Address", value: e.address || "—" },
    { label: "Ward", value: e.ward || "—" },
    { label: "Status", value: e.status || "—" },
    { label: "Permit Type", value: e.permitType || "—" },
    { label: "Work Type", value: e.workType || "—" },
    { label: "Source", value: e.sourceLabel || e.source || "—" },
    { label: "Description", value: e.description || "—" },
  ];

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.setAttribute("role", "dialog");
  overlay.setAttribute("aria-modal", "true");
  overlay.setAttribute("aria-label", `Event details: ${e.title}`);
  overlay.onclick = (ev) => { if (ev.target === overlay) closeModal(); };

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-color-bar" style="background:${e.color}"></div>
        <div class="modal-title-group">
          <div class="modal-title">${escHtml(e.title)}</div>
          <div class="modal-source">${e.sourceLabel || e.source}</div>
        </div>
        <button class="modal-close" onclick="closeModal()" aria-label="Close details">&times;</button>
      </div>
      <div class="modal-body">
        ${fields.map(f => `
          <div class="modal-field">
            <span class="field-label">${f.label}</span>
            <span class="field-value">${f.value}</span>
          </div>
        `).join("")}
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="closeModal();panTo(${e.lat}, ${e.lon})">📍 Show on map</button>
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  // Focus the close button
  setTimeout(() => overlay.querySelector(".modal-close")?.focus(), 50);
}

function closeModal() {
  const overlay = document.querySelector(".modal-overlay");
  if (overlay) overlay.remove();
}

function panTo(lat, lon) {
  if (lat && lon) map.setView([lat, lon], 16, { animate: true });
}

// ── Loading ────────────────────────────────────
function showLoading() {
  document.getElementById("resultCount").textContent = "Loading...";
  document.getElementById("eventList").innerHTML = `
    <div class="skeleton-list" aria-label="Loading events" role="status">
      ${[1,2,3,4,5].map(() => `
        <div class="skeleton-card">
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w60 sm"></div>
          <div class="skeleton-line w40 sm"></div>
        </div>
      `).join("")}
    </div>`;
}

function hideLoading() {
  // no-op, render replaces content
}

// ── Start ──────────────────────────────────────
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
